version: "3.9"

services:
  db:
    container_name: tz_lyapanov_db
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: TZLyapanovDB
    restart: always
    ports:
      - "54322:5432"
    volumes:
      - db-data:/var/lib/postgresql
      - ./src/main/db_init/init_db.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      tz-network:
        aliases:
          - db

volumes:
  db-data:
    driver: local

networks:
  tz-network:
    driver: bridge